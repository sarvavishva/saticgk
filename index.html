<!DOCTYPE html>
<html>
<head>
<title>Professional Quiz System</title>
<style>

body {
font-family: Arial;
margin:0;
background:#f2f2f2;
}

.container {
display:flex;
height:100vh;
}

/* LEFT SIDE - QUESTION AREA */
.question-area {
flex:3;
padding:20px;
overflow-y:auto;
background:white;
}

.option {
margin:8px 0;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
cursor:pointer;
}

.option.correct { background:#c8f7c5; }
.option.wrong { background:#f7c5c5; }

button {
margin:5px;
padding:8px 15px;
}

/* RIGHT SIDE - NAVIGATION PANEL */
.nav-area {
flex:1;
background:#222;
color:white;
padding:15px;
position:fixed;
right:0;
top:0;
height:100%;
overflow-y:auto;
width:260px;
}

.summary {
margin-bottom:15px;
}

.nav-grid {
display:flex;
flex-wrap:wrap;
gap:5px;
}

.nav-btn {
width:35px;
height:35px;
border:none;
cursor:pointer;
background:#555;
color:white;
}

.nav-btn.current { background:#1e90ff; }
.nav-btn.answered { background:#28a745; }
.nav-btn.notanswered { background:#dc3545; }

</style>
</head>
<body>

<div class="container">

<div class="question-area" style="margin-right:260px;">
<h2>POLITY-PREAMBLE MCQ Quiz</h2>

<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="showResult()">Submit</button>

<div id="explanation"></div>
<div id="result"></div>

</div>

<div class="nav-area">

<h3>Question Palette</h3>

<div class="summary">
Answered: <span id="answeredCount">0</span><br>
Not Answered: <span id="notAnsweredCount">0</span><br>
Not Visited: <span id="notVisitedCount">0</span>
</div>

<div class="nav-grid" id="navPanel"></div>

</div>

</div>

<script>

// =============================
// ADD QUESTIONS HERE (Unlimited)
// =============================
const quizData = [
{
question: "How many classical dances are recognised by the Sangeet Natak Akademi?",
options: ["6","7","8","9"],
correctAnswer: "8",
explanation: "Sangeet Natak Akademi recognised 8 classical dances."
},
{
question: "Which classical dance belongs to Tamil Nadu?",
options: ["Kathak","Bharatanatyam","Odissi","Sattriya"],
correctAnswer: "Bharatanatyam",
explanation: "Bharatanatyam is the classical dance of Tamil Nadu."
},
{
question: "Kathak is the classical dance of which state?",
options: ["Kerala","Assam","Uttar Pradesh","Manipur"],
correctAnswer: "Uttar Pradesh",
explanation: "Kathak originated in Uttar Pradesh."
},
{
question: "Kuchipudi is from which state?",
options: ["Odisha","Andhra Pradesh","Manipur","Tamil Nadu"],
correctAnswer: "Andhra Pradesh",
explanation: "Kuchipudi is from Andhra Pradesh."
}
];

// =============================
// SHUFFLE FUNCTION
// =============================
function shuffleArray(array){
for(let i = array.length - 1; i > 0; i--){
let j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
return array;
}

// Shuffle questions
shuffleArray(quizData);

// Shuffle options
quizData.forEach(q => shuffleArray(q.options));

// =============================
// QUIZ LOGIC
// =============================
let current = 0;
let answers = new Array(quizData.length).fill(null);
let visited = new Array(quizData.length).fill(false);

function loadQuestion(){

visited[current] = true;

let q = quizData[current];

document.getElementById("progress").innerText =
"Question " + (current+1) + " of " + quizData.length;

document.getElementById("question").innerText = q.question;

let html = "";

for(let i=0;i<q.options.length;i++){

let className = "option";

if(answers[current] !== null){
if(q.options[i] === q.correctAnswer)
className += " correct";
else if(i === answers[current])
className += " wrong";
}

html += '<div class="'+className+'" onclick="selectAnswer('+i+')">'+q.options[i]+'</div>';
}

document.getElementById("options").innerHTML = html;

if(answers[current] !== null){
document.getElementById("explanation").innerHTML =
"<b>Explanation:</b> " + q.explanation;
}else{
document.getElementById("explanation").innerHTML = "";
}

loadNavigation();
updateSummary();
}

function selectAnswer(index){
answers[current] = index;
loadQuestion();
}

function nextQuestion(){
if(current < quizData.length-1){
current++;
loadQuestion();
}
}

function prevQuestion(){
if(current > 0){
current--;
loadQuestion();
}
}

function goToQuestion(i){
current = i;
loadQuestion();
}

function loadNavigation(){

let navHTML = "";

for(let i=0;i<quizData.length;i++){

let className = "nav-btn";

if(i === current) className += " current";
else if(answers[i] !== null) className += " answered";
else if(visited[i]) className += " notanswered";

navHTML += '<button class="'+className+'" onclick="goToQuestion('+i+')">'+(i+1)+'</button>';
}

document.getElementById("navPanel").innerHTML = navHTML;
}

function updateSummary(){

let answered = answers.filter(a=>a!==null).length;
let notVisited = visited.filter(v=>v===false).length;
let notAnswered = quizData.length - answered - notVisited;

document.getElementById("answeredCount").innerText = answered;
document.getElementById("notAnsweredCount").innerText = notAnswered;
document.getElementById("notVisitedCount").innerText = notVisited;
}

function showResult(){

let score = 0;

for(let i=0;i<quizData.length;i++){
if(quizData[i].options[answers[i]] === quizData[i].correctAnswer){
score++;
}
}

document.getElementById("result").innerHTML =
"<h3>Your Score: "+score+" / "+quizData.length+"</h3>";
}

loadQuestion();

</script>

</body>
</html>
